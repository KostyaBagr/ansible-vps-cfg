- name: Update packages
  become: yes
  apt:
    upgrade: yes
    update_cache: yes
    cache_valid_time: 86400
    
- name: Install required packages
  apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - git
      - software-properties-common
      - python3-pip
      - virtualenv
      - python3-setuptools
      - python3-passlib
      - ufw
      - zsh
      - fail2ban
      - vim
    state: present
    update_cache: yes

- import_tasks: docker.yml
- import_tasks: user.yml
- import_tasks: oh-my-zsh.yml
- import_tasks: ssh.yml
